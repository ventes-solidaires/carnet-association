<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Carnet de l'Association</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
/* ════════════════════════════════════════════════════════════
   JETONS DE DESIGN — Le Carnet de l'Association
   Palette inspirée du marché associatif : papier chaud, vert
   verger, rouge cerise, jaune blé. Reprend le vert utilisé
   dans les autres outils EISS pour garder une cohérence visuelle.
   ════════════════════════════════════════════════════════════ */
:root{
  --paper:#FAF6EC;
  --paper-soft:#F1EADA;
  --card:#FFFFFF;
  --ink:#2B2723;
  --ink-soft:#766C5E;
  --green:#2F6B4F;
  --green-dark:#1F4A35;
  --green-pale:#E4EEE6;
  --cerise:#BD4338;
  --cerise-pale:#F7E3DF;
  --gold:#CE9A35;
  --gold-pale:#F6ECD6;
  --line:#E6DCC6;
  --radius:16px;
  --radius-sm:10px;
  --shadow:0 2px 10px rgba(43,39,35,.06), 0 10px 30px rgba(43,39,35,.05);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Public Sans',-apple-system,Segoe UI,sans-serif;
  font-size:16px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{
  font-family:'Fraunces',serif;
  font-weight:600;
  letter-spacing:-0.01em;
  margin:0 0 6px;
  color:var(--green-dark);
}
p{margin:0 0 10px;}
a{color:var(--green-dark);}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:16px;}
.hidden{display:none !important;}
img{max-width:100%;display:block;}

/* ---------- Mise en page générale ---------- */
#app{min-height:100vh;display:flex;flex-direction:column;}
.conteneur{width:100%;max-width:880px;margin:0 auto;padding:0 18px;}
.conteneur-etroit{width:100%;max-width:620px;margin:0 auto;padding:0 18px;}

/* ---------- Barre du haut ---------- */
.topbar{
  background:var(--green);
  color:#fff;
  position:sticky;top:0;z-index:40;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.topbar-inner{
  max-width:880px;margin:0 auto;padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.marque{display:flex;align-items:center;gap:10px;cursor:pointer;min-width:0;}
.marque-pastille{
  width:38px;height:38px;border-radius:50%;
  background:var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-size:19px;flex-shrink:0;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.35);
}
.marque-texte{min-width:0;}
.marque-texte .nom{
  font-family:'Fraunces',serif;font-weight:700;font-size:18px;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.marque-texte .sous{font-size:11.5px;color:#E3EFE8;opacity:.9;}
.topbar-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.badge-sync{
  display:flex;align-items:center;gap:6px;
  font-size:11.5px;font-weight:600;
  padding:5px 10px;border-radius:20px;
  background:rgba(255,255,255,.14);color:#fff;
  cursor:pointer;border:none;white-space:nowrap;
}
.badge-sync .pt{width:7px;height:7px;border-radius:50%;background:#9be3ad;}
.badge-sync.off .pt{background:#f0b4ab;}
.badge-sync.sync .pt{background:#f6d98a;animation:clignote 1s infinite;}
@keyframes clignote{0%,100%{opacity:1}50%{opacity:.3}}
.btn-icone-top{
  background:rgba(255,255,255,.14);border:none;color:#fff;
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:16px;
}

/* ---------- Boutons ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  border:none;border-radius:11px;
  padding:12px 20px;font-size:15px;font-weight:700;
  transition:transform .08s, filter .15s;
}
.btn:active{transform:scale(.97);}
.btn-vert{background:var(--green);color:#fff;}
.btn-vert:hover{filter:brightness(1.08);}
.btn-cerise{background:var(--cerise);color:#fff;}
.btn-or{background:var(--gold);color:#3a2c0c;}
.btn-fantome{background:transparent;color:var(--green-dark);border:1.5px solid var(--line);}
.btn-fantome:hover{background:var(--paper-soft);}
.btn-petit{padding:8px 14px;font-size:13.5px;border-radius:9px;}
.btn-large{width:100%;padding:15px 20px;font-size:16px;}
.btn-danger-texte{background:none;border:none;color:var(--cerise);font-size:13px;font-weight:700;padding:6px 4px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* ---------- Cartes ---------- */
.carte{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  border:1px solid var(--line);
  overflow:hidden;
}
.carte-pad{padding:20px;}

/* ---------- Pied scalloppé (élément signature : ticket de kermesse) ---------- */
.ticket{position:relative;margin:26px 0;}
.ticket::before,.ticket::after{
  content:"";position:absolute;left:0;right:0;height:13px;
  background-image:radial-gradient(circle at 10px 7px, var(--paper) 7px, transparent 7.5px);
  background-size:20px 16px;background-repeat:repeat-x;background-position:center;
}
.ticket::before{top:-7px;}
.ticket::after{bottom:-7px;transform:rotate(180deg);}
.ticket-corps{border:1.5px dashed var(--line);border-radius:4px;background:var(--card);box-shadow:var(--shadow);}

/* ---------- Accueil public : grille d'événements ---------- */
.entete-public{padding:26px 0 18px;}
.entete-public .accroche{color:var(--ink-soft);font-size:15px;max-width:480px;}
.grille-evenements{
  display:grid;grid-template-columns:1fr;gap:18px;padding:6px 0 40px;
}
@media(min-width:620px){.grille-evenements{grid-template-columns:1fr 1fr;}}

.carte-evt{cursor:pointer;transition:transform .12s, box-shadow .12s;display:flex;flex-direction:column;}
.carte-evt:hover{transform:translateY(-3px);box-shadow:0 4px 16px rgba(43,39,35,.1),0 16px 34px rgba(43,39,35,.08);}
.carte-evt .photo{width:100%;aspect-ratio:16/10;object-fit:cover;background:var(--paper-soft);}
.carte-evt .photo-vide{
  width:100%;aspect-ratio:16/10;background:linear-gradient(135deg,var(--green-pale),var(--gold-pale));
  display:flex;align-items:center;justify-content:center;font-size:42px;
}
.carte-evt .corps{padding:16px 18px 18px;display:flex;flex-direction:column;gap:8px;flex:1;}
.carte-evt h3{font-size:19px;margin:0;}
.carte-evt .desc{color:var(--ink-soft);font-size:13.5px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ligne-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:auto;padding-top:6px;}
.prix-mini{font-weight:800;color:var(--green-dark);font-size:14.5px;}
.pastille-delai{
  font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;
}
.pastille-delai.vert{background:var(--green-pale);color:var(--green-dark);}
.pastille-delai.orange{background:var(--gold-pale);color:#7a5a14;}
.pastille-delai.fermee{background:#EFE9E0;color:var(--ink-soft);}

.etat-vide{
  text-align:center;padding:60px 20px;color:var(--ink-soft);
}
.etat-vide .ic{font-size:40px;margin-bottom:10px;}

/* ---------- Détail évènement ---------- */
.fil-retour{display:flex;align-items:center;gap:6px;color:var(--green-dark);font-weight:700;font-size:14px;
  background:none;border:none;padding:14px 0;}
.detail-photo{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:var(--radius);box-shadow:var(--shadow);}
.detail-photo-vide{
  width:100%;aspect-ratio:16/9;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--green-pale),var(--gold-pale));
  display:flex;align-items:center;justify-content:center;font-size:54px;box-shadow:var(--shadow);
}
.entete-detail{padding:20px 0 6px;}
.lignes-info{display:flex;flex-wrap:wrap;gap:10px 18px;margin:10px 0 16px;font-size:13.5px;color:var(--ink-soft);}
.lignes-info b{color:var(--ink);}
.desc-longue{white-space:pre-wrap;color:var(--ink);font-size:15px;margin-bottom:18px;}

.liste-tarifs{display:flex;flex-direction:column;gap:8px;margin:14px 0 4px;}
.opt-tarif{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  border:1.5px solid var(--line);border-radius:11px;padding:13px 16px;
  cursor:pointer;background:var(--card);
}
.opt-tarif.selectionne{border-color:var(--green);background:var(--green-pale);}
.opt-tarif .libelle{font-weight:700;}
.opt-tarif .prix{font-weight:800;color:var(--green-dark);}
.opt-tarif input{accent-color:var(--green);width:18px;height:18px;}

.zone-fermee{
  background:var(--cerise-pale);border:1.5px solid #e7c4bd;border-radius:var(--radius-sm);
  padding:16px;color:#7a2e23;font-weight:600;text-align:center;margin-top:16px;
}

/* ---------- Formulaire commande ---------- */
.champ{margin-bottom:14px;}
.champ label{display:block;font-size:13px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:.02em;}
.champ input[type=text],.champ input[type=tel],.champ input[type=number],
.champ input[type=date],.champ input[type=password],.champ textarea,.champ select{
  width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:10px;
  background:#fff;color:var(--ink);
}
.champ input:focus,.champ textarea:focus,.champ select:focus{outline:2px solid var(--green);outline-offset:1px;}
.champ textarea{resize:vertical;min-height:70px;}
.stepper{display:flex;align-items:center;gap:14px;}
.stepper button{
  width:42px;height:42px;border-radius:50%;border:1.5px solid var(--line);background:#fff;
  font-size:19px;font-weight:700;color:var(--green-dark);
}
.stepper .val{font-size:19px;font-weight:800;min-width:34px;text-align:center;}
.bloc-total{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--green-pale);border-radius:11px;padding:15px 18px;margin:18px 0;
}
.bloc-total .lib{font-weight:700;color:var(--green-dark);}
.bloc-total .montant{font-size:24px;font-weight:800;color:var(--green-dark);font-family:'Fraunces',serif;}

/* ---------- Confirmation (ticket) ---------- */
.confirm-icone{font-size:46px;text-align:center;margin-bottom:6px;}
.confirm-corps{padding:30px 26px;text-align:center;}
.confirm-num{
  font-family:'Fraunces',serif;font-weight:700;font-size:13px;letter-spacing:.08em;
  color:var(--ink-soft);text-transform:uppercase;margin-bottom:4px;
}
.confirm-recap{
  text-align:left;border-top:1.5px dashed var(--line);margin-top:18px;padding-top:16px;
  display:flex;flex-direction:column;gap:7px;font-size:14.5px;
}
.confirm-recap .ligne{display:flex;justify-content:space-between;gap:10px;}
.confirm-recap .ligne b{text-align:right;}
.confirm-message{color:var(--ink-soft);font-size:13.5px;margin-top:16px;}

/* ---------- Connexion admin ---------- */
.ecran-login{display:flex;align-items:center;justify-content:center;min-height:70vh;padding:20px;}
.boite-login{max-width:380px;width:100%;text-align:center;}
.boite-login .ic{font-size:38px;margin-bottom:8px;}

/* ---------- Espace admin : onglets ---------- */
.onglets-admin{
  display:flex;gap:4px;background:var(--paper-soft);border-radius:13px;padding:4px;margin:18px 0 20px;
  overflow-x:auto;
}
.onglet{
  flex:1;text-align:center;padding:10px 8px;border:none;background:none;border-radius:10px;
  font-weight:700;font-size:13.5px;color:var(--ink-soft);white-space:nowrap;
}
.onglet.actif{background:var(--card);color:var(--green-dark);box-shadow:var(--shadow);}

/* ---------- Tableau de bord ---------- */
.grille-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:22px;}
@media(min-width:560px){.grille-stats{grid-template-columns:repeat(4,1fr);}}
.stat-carte{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:16px;}
.stat-carte .chiffre{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--green-dark);}
.stat-carte .lib{font-size:12px;color:var(--ink-soft);font-weight:600;margin-top:2px;}
.stat-carte.cerise .chiffre{color:var(--cerise);}
.stat-carte.or .chiffre{color:#9c7517;}

.bloc-section{margin-bottom:26px;}
.titre-section{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;}
.titre-section h3{margin:0;font-size:17px;}

/* ---------- Admin : liste événements ---------- */
.liste-evt-admin{display:flex;flex-direction:column;gap:10px;}
.ligne-evt-admin{
  display:flex;gap:14px;align-items:center;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:12px 14px;
}
.ligne-evt-admin .mini-photo{width:58px;height:58px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--paper-soft);}
.ligne-evt-admin .mini-photo-vide{
  width:58px;height:58px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--green-pale),var(--gold-pale));
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
.ligne-evt-admin .infos{flex:1;min-width:0;}
.ligne-evt-admin .infos .t{font-weight:700;font-size:15px;}
.ligne-evt-admin .infos .s{font-size:12.5px;color:var(--ink-soft);}
.etiquette-statut{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;
  padding:3px 8px;border-radius:6px;margin-left:8px;}
.etiquette-statut.publie{background:var(--green-pale);color:var(--green-dark);}
.etiquette-statut.brouillon{background:var(--gold-pale);color:#7a5a14;}
.etiquette-statut.archive{background:#EFE9E0;color:var(--ink-soft);}
.actions-evt{display:flex;gap:6px;flex-shrink:0;}
.btn-rond{
  width:34px;height:34px;border-radius:50%;border:1.5px solid var(--line);background:#fff;
  display:flex;align-items:center;justify-content:center;font-size:14px;
}

/* ---------- Modale ---------- */
.fond-modale{
  position:fixed;inset:0;background:rgba(43,39,35,.45);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  padding:0;
}
@media(min-width:680px){.fond-modale{align-items:center;padding:24px;}}
.boite-modale{
  background:var(--card);width:100%;max-width:640px;max-height:92vh;overflow-y:auto;
  border-radius:20px 20px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.2);
}
@media(min-width:680px){.boite-modale{border-radius:18px;}}
.entete-modale{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);z-index:2;
}
.entete-modale h3{margin:0;font-size:17px;}
.fermer-modale{background:none;border:none;font-size:22px;color:var(--ink-soft);width:32px;height:32px;}
.corps-modale{padding:20px 22px 26px;}
.pied-modale{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;position:sticky;bottom:0;background:var(--card);}

/* ---------- Répéteur de tarifs (modale événement) ---------- */
.ligne-tarif-edit{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.ligne-tarif-edit input{flex:1;}
.ligne-tarif-edit input.prix{max-width:110px;flex:none;}
.btn-suppr-tarif{background:none;border:none;color:var(--cerise);font-size:18px;width:30px;flex-shrink:0;}
.zone-photo-edit{
  border:1.5px dashed var(--line);border-radius:12px;padding:14px;text-align:center;
  background:var(--paper-soft);cursor:pointer;
}
.zone-photo-edit img{max-height:160px;margin:0 auto 8px;border-radius:8px;}
.toggle-statut{display:flex;gap:8px;}
.toggle-statut button{flex:1;padding:10px;border-radius:9px;border:1.5px solid var(--line);background:#fff;font-weight:700;font-size:13.5px;}
.toggle-statut button.actif{background:var(--green);border-color:var(--green);color:#fff;}

/* ---------- Admin : commandes ---------- */
.barre-filtres{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.barre-filtres select,.barre-filtres input{
  padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;background:#fff;font-size:13.5px;
}
.barre-filtres input[type=search]{flex:1;min-width:160px;}
.tableau-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius-sm);background:#fff;}
table.tab-commandes{width:100%;border-collapse:collapse;font-size:13.5px;white-space:nowrap;}
table.tab-commandes th{
  background:var(--paper-soft);text-align:left;padding:11px 12px;font-weight:700;color:var(--ink-soft);
  font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;position:sticky;top:0;
}
table.tab-commandes td{padding:11px 12px;border-top:1px solid var(--line);}
table.tab-commandes tr.recuperee td{opacity:.5;}
.case-recuperee{width:19px;height:19px;accent-color:var(--green);}
.pied-tableau{display:flex;gap:18px;flex-wrap:wrap;padding:14px 4px 4px;font-size:13.5px;color:var(--ink-soft);}
.pied-tableau b{color:var(--ink);}

/* ---------- Paramètres ---------- */
.grille-deux{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:560px){.grille-deux{grid-template-columns:1fr 1fr;}}

/* ---------- Pied de page public ---------- */
.pied-public{padding:30px 0 50px;text-align:center;}
.lien-discret{
  background:none;border:none;color:var(--ink-soft);font-size:12px;text-decoration:underline;
  opacity:.6;padding:8px;
}

/* ---------- Toast ---------- */
#toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:13px 22px;border-radius:30px;font-size:14px;font-weight:600;
  box-shadow:0 6px 24px rgba(0,0,0,.25);z-index:200;opacity:0;transition:opacity .25s, transform .25s;
  pointer-events:none;max-width:90vw;text-align:center;
}
#toast.affiche{opacity:1;transform:translateX(-50%) translateY(0);}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}

/* ---------- Impression du tableau des commandes ---------- */
#zoneImpression{display:none;}
@media print{
  body *{visibility:hidden;}
  #zoneImpression, #zoneImpression *{visibility:visible;}
  #zoneImpression{
    display:block !important;
    position:absolute;top:0;left:0;width:100%;padding:0;margin:0;
  }
  @page{ size:A4 landscape; margin:11mm; }

  .imp-entete{display:flex;align-items:flex-end;justify-content:space-between;
    border-bottom:2.5px solid #000;padding-bottom:8px;margin-bottom:12px;}
  .imp-entete h1{font-family:'Fraunces',serif;font-size:19px;margin:0;color:#000;}
  .imp-entete .souTitre{font-size:12px;color:#333;margin-top:2px;}
  .imp-entete .meta{font-size:10.5px;color:#333;text-align:right;}

  table.imp-tableau{width:100%;border-collapse:collapse;table-layout:fixed;font-size:10px;}
  table.imp-tableau th, table.imp-tableau td{
    border:1px solid #000;padding:5px 6px;text-align:left;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  table.imp-tableau th{background:#e6e6e6 !important;font-size:9.5px;text-transform:uppercase;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;}
  table.imp-tableau td.num, table.imp-tableau th.num{text-align:right;}
  table.imp-tableau tbody tr:nth-child(even) td{background:#f7f7f7 !important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;}
  table.imp-tableau tfoot td{border-top:2px solid #000;font-weight:800;background:#fff !important;}

  .imp-pied{margin-top:10px;font-size:9.5px;color:#555;text-align:right;}
}

</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<div id="zoneImpression"></div>

<script>
/* ════════════════════════════════════════════════════════════
   LE CARNET DE L'ASSOCIATION
   Application mono-fichier — sans installation, sans base de
   données. Stockage des données dans un GitHub Gist dédié,
   avec repli automatique sur le navigateur (localStorage).
   Même esprit que les outils EISS Suivi Dépannage / Planning.
   ════════════════════════════════════════════════════════════ */

/* ────────────────────────────────────────────────────────────
   1. CONFIGURATION
   Même principe que Suivi Dépannage : le Gist et le token sont
   directement renseignés ici. Tant que ces valeurs ne sont pas

function chargerLocal(){

    if(!d || !d.evenements || !d.commandes) return null;

}

/* ────────────────────────────────────────────────────────────
   4. SYNCHRONISATION AVEC LE GIST GITHUB
   ──────────────────────────────────────────────────────────── */
async function chargerDistant(){
  if(!configEstPrete()) return null;
  try{
    const res = await fetch('https://api.github.com/gists/' + CONFIG.GIST_ID, {
      headers: { 'Authorization': 'token ' + CONFIG.GITHUB_TOKEN, 'Accept': 'application/vnd.github+json' }
    });
    if(!res.ok) return null;
    const data = await res.json();
    const fichier = data.files && data.files[CONFIG.GIST_FICHIER];
    if(!fichier || !fichier.content) return null;
    const parse = JSON.parse(fichier.content);
    if(!parse.evenements || !parse.commandes) return null;
    if(!parse.parametres) parse.parametres = donneesParDefaut().parametres;
    return parse;
  }catch(e){ return null; }
}

async function enregistrerDistant(donnees){
  if(!configEstPrete()) return false;
  try{
    const res = await fetch('https://api.github.com/gists/' + CONFIG.GIST_ID, {
      method: 'PATCH',
      headers: { 'Authorization': 'token ' + CONFIG.GITHUB_TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { [CONFIG.GIST_FICHIER]: { content: JSON.stringify(donnees, null, 2) } } })
    });
    return res.ok;
  }catch(e){ return false; }
}

// Fusionne deux états sans jamais perdre une commande, même en cas
// de double écriture presque simultanée (deux clients qui commandent
// au même moment, ou admin + client en parallèle).
function fusionnerEtats(local, distant){
  const evenements = (distant.evenements && distant.evenements.length) ? distant.evenements : (local.evenements || []);
  const carte = {};
  (distant.commandes || []).forEach(c => carte[c.id] = c);
  (local.commandes || []).forEach(c => { if(!carte[c.id]) carte[c.id] = c; });
  const commandes = Object.values(carte).sort((a,b) => new Date(b.dateCommande) - new Date(a.dateCommande));
  const parametres = Object.assign({}, donneesParDefaut().parametres, local.parametres, distant.parametres);
  return { evenements, commandes, parametres };
}

function definirEtatSync(etat){
  window._dernierEtatSync = etat;
  const el = document.getElementById('badgeSync');
  if(!el) return;
  el.classList.remove('off','sync');
  if(etat === 'off'){ el.classList.add('off'); el.querySelector('.txt').textContent = configEstPrete() ? 'Hors ligne' : 'Mode local'; }
  else if(etat === 'sync'){ el.classList.add('sync'); el.querySelector('.txt').textContent = 'Synchro…'; }
  else { el.querySelector('.txt').textContent = 'Synchronisé'; }
}

// Lecture seule (utilisée au démarrage et lors des rafraîchissements automatiques)
async function synchroniser(manuel){
  if(manuel) definirEtatSync('sync');
  const distant = await chargerDistant();
  if(distant){
    const fusion = fusionnerEtats(state, distant);
    const aChange = JSON.stringify(fusion) !== JSON.stringify(state);
    state = fusion;
    sauverLocal();
    definirEtatSync('ok');
    if(aChange){
      renderApp();
      enregistrerDistant(state); // republie si la fusion a réintégré des données locales absentes du distant
    } else if(manuel){
      renderApp();
    }
  } else {
    definirEtatSync('off');
  }
}

// Écriture sécurisée : on relit le distant, on fusionne, on applique le
// changement demandé, puis on republie. Utilisée pour CHAQUE écriture
// (commande client, modification événement, etc.) afin de ne jamais
// écraser une donnée ajoutée ailleurs entre-temps.
async function enregistrerEtat(fonctionDeModification){
  definirEtatSync('sync');
  const distant = await chargerDistant();
  let base = distant ? fusionnerEtats(state, distant) : state;
  base = fonctionDeModification(base);
  state = base;
  sauverLocal();
  renderApp();
  const ok = await enregistrerDistant(state);
  definirEtatSync(ok ? 'ok' : 'off');
  return ok;
}

/* ────────────────────────────────────────────────────────────

function genererId(prefixe){
  return (prefixe||'id') + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8);
}
function formaterDate(iso){
  if(!iso) return '';
  const p = iso.split('-');
  if(p.length !== 3) return iso;
  return p[2] + '/' + p[1] + '/' + p[0];
}
function formaterDateHeure(iso){
  if(!iso) return '';
  const d = new Date(iso);
  if(isNaN(d)) return '';
  return d.toLocaleDateString('fr-FR') + ' à ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
function formaterMontant(n){
  return (Math.round((n||0)*100)/100).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
}
function joursRestants(dateLimite){
  if(!dateLimite) return null;
  const auj = new Date(); auj.setHours(0,0,0,0);
  const lim = new Date(dateLimite + 'T00:00:00');
  return Math.round((lim - auj) / 86400000);
}
function commandesOuvertes(evt){
  if(!evt.dateLimite) return true;
  return joursRestants(evt.dateLimite) >= 0;
}
function afficherToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('affiche');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=> t.classList.remove('affiche'), 2600);
}
function echapper(s){
  return (s||'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Redimensionne et compresse une photo côté navigateur avant stockage
// (le Gist reste léger même avec plusieurs événements illustrés).
function compresserImage(fichier, largeurMax){
  return new Promise((resolve, reject) => {
    const lecteur = new FileReader();
    lecteur.onload = e => {
      const img = new Image();
      img.onload = () => {
        const echelle = Math.min(1, (largeurMax||900) / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * echelle);
        canvas.height = Math.round(img.height * echelle);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.onerror = () => reject(new Error('image illisible'));
      img.src = e.target.result;
    };
    lecteur.onerror = () => reject(new Error('lecture impossible'));
    lecteur.readAsDataURL(fichier);
  });
}

let derniereCommandeId = null;

async function validerCommande(evenementId){
  const evt = (state.evenements||[]).find(e => e.id === evenementId);
  const tarif = evt.tarifs.find(t => t.id === formCommande.tarifId);
  if(!formCommande.nom.trim() || !formCommande.prenom.trim() || !formCommande.telephone.trim()){
    afficherToast('Merci de renseigner nom, prénom et téléphone.');
    return;
  }
  const btn = document.getElementById('btnValiderCommande');
  btn.disabled = true; btn.textContent = 'Enregistrement…';

  const commande = {
    id: genererId('cmd'),
    evenementId: evt.id,
    evenementTitre: evt.titre,
    nom: formCommande.nom.trim(),
    prenom: formCommande.prenom.trim(),
    telephone: formCommande.telephone.trim(),
    tarifId: tarif.id,
    tarifLibelle: tarif.libelle,
    prixUnitaire: tarif.prix,
    quantite: formCommande.quantite,
    montant: tarif.prix * formCommande.quantite,
    commentaire: formCommande.commentaire.trim(),
    dateCommande: new Date().toISOString(),
    recuperee: false
  };

  await enregistrerEtat(base => {
    const cs = (base.commandes||[]).slice();
    cs.push(commande);
    return Object.assign({}, base, { commandes: cs });
  });

  derniereCommandeId = commande.id;
  formCommande = { tarifId:null, quantite:1, nom:'', prenom:'', telephone:'', commentaire:'' };
  allerA('public-confirm', { evenementId: evenementId });
}

function supprimerLigneTarif(i){

async function surChangementPhoto(input){
  if(!input.files || !input.files[0]) return;
  afficherToast('Traitement de la photo…');
  try{
    const dataUrl = await compresserImage(input.files[0], 900);
    editionEvt.photo = dataUrl;
    document.getElementById('zoneModaleEvt').innerHTML = renderModaleEvenement();
  }catch(e){
    afficherToast('Impossible de lire cette image.');
  }

async function enregistrerEvenement(){
  if(!editionEvt.titre.trim()){ afficherToast('Le titre est obligatoire.'); return; }
  if(!editionEvt.tarifs.some(t=>t.libelle.trim())){ afficherToast('Ajoutez au moins une option avec un libellé.'); return; }
  if(!editionEvt.id){ editionEvt.id = genererId('evt'); editionEvt.creeLe = new Date().toISOString(); }

  const evtAEnregistrer = editionEvt;
  await enregistrerEtat(base => {
    const liste = (base.evenements||[]).slice();
    const idx = liste.findIndex(e=>e.id===evtAEnregistrer.id);
    if(idx>=0) liste[idx] = evtAEnregistrer; else liste.push(evtAEnregistrer);
    return Object.assign({}, base, { evenements: liste });
  });
  afficherToast('Événement enregistré.');
  fermerModaleEvenement();
  allerA('admin', { ongletAdmin:'evenements' });
}
function dupliquerEvenement(id){
  const evt = (state.evenements||[]).find(e=>e.id===id);
  if(!evt) return;
  const copie = JSON.parse(JSON.stringify(evt));
  copie.id = null;
  copie.titre = copie.titre + ' (copie)';
  copie.statut = 'brouillon';
  copie.dateEvenement = ''; copie.dateLimite = '';
  editionEvt = copie;
  allerA('admin', { ongletAdmin:'evenements' });
  setTimeout(()=>{ document.getElementById('zoneModaleEvt').innerHTML = renderModaleEvenement(); }, 0);
}
async function supprimerEvenement(id){
  const evt = (state.evenements||[]).find(e=>e.id===id);
  const nbCmd = (state.commandes||[]).filter(c=>c.evenementId===id).length;
  const msg = nbCmd>0
    ? `Cet événement a ${nbCmd} commande(s) enregistrée(s). Les commandes seront conservées mais l'événement sera supprimé. Continuer ?`
    : `Supprimer définitivement « ${evt.titre} » ?`;
  if(!confirm(msg)) return;
  await enregistrerEtat(base => Object.assign({}, base, { evenements: (base.evenements||[]).filter(e=>e.id!==id) }));
  afficherToast('Événement supprimé.');
  allerA('admin', { ongletAdmin:'evenements' });
}

let filtreCommandes = { evenementId:'', recherche:'', cacherRecuperees:false };

  const evts = state.evenements||[];
  return `

        <tbody id="corpsTableCommandes"></tbody>

function commandesFiltrees(){
  let cs = (state.commandes||[]).slice();
  if(filtreCommandes.evenementId) cs = cs.filter(c=>c.evenementId===filtreCommandes.evenementId);
  if(filtreCommandes.cacherRecuperees) cs = cs.filter(c=>!c.recuperee);
  if(filtreCommandes.recherche.trim()){
    const r = filtreCommandes.recherche.trim().toLowerCase();
    cs = cs.filter(c => (c.nom+' '+c.prenom+' '+c.telephone).toLowerCase().includes(r));
  }
  return cs.sort((a,b)=> new Date(b.dateCommande)-new Date(a.dateCommande));
}

function rafraichirTableCommandes(){
  const cs = commandesFiltrees();
  const corps = document.getElementById('corpsTableCommandes');
  if(!corps) return;
  corps.innerHTML = cs.length ? cs.map(c => `
    <tr class="${c.recuperee?'recuperee':''}">
      <td>${echapper(c.nom)}</td>
      <td>${echapper(c.prenom)}</td>
      <td>${echapper(c.telephone)}</td>
      <td>${echapper(c.evenementTitre)}</td>
      <td>${echapper(c.tarifLibelle)}</td>
      <td>${c.quantite}</td>
      <td>${formaterMontant(c.montant)}</td>
      <td>${formaterDateHeure(c.dateCommande)}</td>
      <td><input type="checkbox" class="case-recuperee" ${c.recuperee?'checked':''} onchange="basculerRecuperee('${c.id}')"></td>
      <td><button class="btn-danger-texte" onclick="supprimerCommande('${c.id}')">Suppr.</button></td>
    </tr>`).join('') : `<tr><td colspan="10" style="text-align:center;color:var(--ink-soft);padding:24px;">Aucune commande pour ces filtres.</td></tr>`;

  const pied = document.getElementById('piedTableCommandes');
  if(pied){
    const nb = cs.length;
    const qte = cs.reduce((s,c)=>s+c.quantite,0);
    const ca = cs.reduce((s,c)=>s+c.montant,0);
    pied.innerHTML = `<span><b>${nb}</b> commande${nb!==1?'s':''}</span><span><b>${qte}</b> unité${qte!==1?'s':''} vendue${qte!==1?'s':''}</span><span><b>${formaterMontant(ca)}</b> de chiffre</span>`;
  }
}

async function basculerRecuperee(id){
  await enregistrerEtat(base => {
    const cs = (base.commandes||[]).map(c => c.id===id ? Object.assign({}, c, {recuperee: !c.recuperee}) : c);
    return Object.assign({}, base, { commandes: cs });
  });
  rafraichirTableCommandes();
}
async function supprimerCommande(id){
  if(!confirm('Supprimer cette commande ?')) return;
  await enregistrerEtat(base => Object.assign({}, base, { commandes: (base.commandes||[]).filter(c=>c.id!==id) }));
  rafraichirTableCommandes();
}
function libelleFiltreEvenement(){
  if(!filtreCommandes.evenementId) return '';
  const e = (state.evenements||[]).find(x=>x.id===filtreCommandes.evenementId);
  return e ? e.titre : '';
}
function nettoyerPourNomFichier(s){
  return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]+/g,'_').replace(/^_+|_+$/g,'') || 'Sans_titre';
}

function exporterExcelCommandes(){
  const cs = commandesFiltrees();
  if(!cs.length){ afficherToast('Aucune commande à exporter pour ces filtres.'); return; }

  const nomAsso = state.parametres.nomAssociation || 'Association';
  const evtFiltre = libelleFiltreEvenement();
  const entetes = ['Nom','Prénom','Téléphone','Événement','Choix','Quantité','Montant (€)','Date commande','Récupérée','Commentaire'];
  const nbCol = entetes.length;

  const bordureFine = { top:{style:'thin',color:{rgb:'FFCCCCCC'}}, bottom:{style:'thin',color:{rgb:'FFCCCCCC'}}, left:{style:'thin',color:{rgb:'FFCCCCCC'}}, right:{style:'thin',color:{rgb:'FFCCCCCC'}} };
  const styleTitre    = { font:{bold:true, sz:14, color:{rgb:'FFFFFFFF'}}, fill:{patternType:'solid', fgColor:{rgb:'FF2F6B4F'}}, alignment:{vertical:'center', horizontal:'left'} };
  const styleSousTitre = { font:{italic:true, sz:10, color:{rgb:'FF766C5E'}}, fill:{patternType:'solid', fgColor:{rgb:'FFFAF6EC'}} };
  const styleEntete   = { font:{bold:true, sz:10, color:{rgb:'FFFFFFFF'}}, fill:{patternType:'solid', fgColor:{rgb:'FF234F3B'}}, alignment:{horizontal:'center', vertical:'center'}, border:bordureFine };
  const styleCellule    = { font:{sz:10, color:{rgb:'FF2B2723'}}, border:bordureFine, alignment:{vertical:'center'} };
  const styleCelluleAlt = Object.assign({}, styleCellule, { fill:{patternType:'solid', fgColor:{rgb:'FFF1EADA'}} });
  const styleTotalLabel = { font:{bold:true, sz:10.5, color:{rgb:'FF1F4A35'}}, fill:{patternType:'solid', fgColor:{rgb:'FFE4EEE6'}}, border:bordureFine, alignment:{horizontal:'left'} };
  const styleTotalValeur = Object.assign({}, styleTotalLabel, { alignment:{horizontal:'right'} });

  // ── Construction des lignes : titre / sous-titre / blanc / en-têtes / données / total ──
  const lignes = [];
  lignes.push([ 'COMMANDES — ' + nomAsso.toUpperCase() + (evtFiltre ? ' — ' + evtFiltre.toUpperCase() : '') ]);
  lignes.push([ 'Export du ' + new Date().toLocaleDateString('fr-FR') + ' à ' + new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) + ' · ' + cs.length + ' commande' + (cs.length!==1?'s':'') ]);
  lignes.push([]);
  lignes.push(entetes);
  cs.forEach(c => lignes.push([
    c.nom, c.prenom, c.telephone, c.evenementTitre, c.tarifLibelle, c.quantite, c.montant,
    formaterDateHeure(c.dateCommande), c.recuperee ? 'OUI' : 'NON', c.commentaire || ''
  ]));
  const totalQte = cs.reduce((s,c)=>s+c.quantite,0);
  const totalCA = cs.reduce((s,c)=>s+c.montant,0);
  const ligneTotalIdx = lignes.length;
  lignes.push(['','','','','TOTAL', totalQte, totalCA, '', '', '']);

  const feuille = XLSX.utils.aoa_to_sheet(lignes);

  // Fusions des lignes de titre
  feuille['!merges'] = [
    { s:{r:0,c:0}, e:{r:0,c:nbCol-1} },
    { s:{r:1,c:0}, e:{r:1,c:nbCol-1} }
  ];

  // Largeurs de colonnes
  feuille['!cols'] = [
    {wch:16},{wch:14},{wch:15},{wch:24},{wch:12},{wch:10},{wch:13},{wch:18},{wch:11},{wch:30}
  ];

  // Style ligne titre (0) et sous-titre (1)
  for(let c=0;c<nbCol;c++){
    const adrT = XLSX.utils.encode_cell({r:0,c});
    if(!feuille[adrT]) feuille[adrT] = {t:'s', v:''};
    feuille[adrT].s = styleTitre;
    const adrS = XLSX.utils.encode_cell({r:1,c});
    if(!feuille[adrS]) feuille[adrS] = {t:'s', v:''};
    feuille[adrS].s = styleSousTitre;
  }
  // Style des en-têtes (ligne 3)
  for(let c=0;c<nbCol;c++){
    const adr = XLSX.utils.encode_cell({r:3,c});
    if(feuille[adr]) feuille[adr].s = styleEntete;
  }
  // Style des lignes de données, avec alternance et format monétaire
  cs.forEach((cmd,i) => {
    const r = 4+i;
    for(let c=0;c<nbCol;c++){
      const adr = XLSX.utils.encode_cell({r,c});
      if(!feuille[adr]) feuille[adr] = {t:'s', v:''};
      feuille[adr].s = (i%2===0) ? styleCellule : styleCelluleAlt;
      if(c===5) feuille[adr].s = Object.assign({}, feuille[adr].s, {alignment:{horizontal:'center'}});
      if(c===6){ feuille[adr].z = '#,##0.00 "€"'; feuille[adr].s = Object.assign({}, feuille[adr].s, {alignment:{horizontal:'right'}}); }
    }
  });
  // Style ligne total
  for(let c=0;c<nbCol;c++){
    const adr = XLSX.utils.encode_cell({r:ligneTotalIdx,c});
    if(!feuille[adr]) feuille[adr] = {t:'s', v:''};
    feuille[adr].s = (c===4) ? styleTotalLabel : styleTotalValeur;
    if(c===6) feuille[adr].z = '#,##0.00 "€"';
  }

  // Filtres automatiques sur la zone en-têtes + données (sans la ligne total)
  feuille['!autofilter'] = { ref: XLSX.utils.encode_range({ s:{r:3,c:0}, e:{r:3+cs.length, c:nbCol-1} }) };

  const classeur = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(classeur, feuille, 'Commandes');
  const nomFichier = 'Commandes_' + nettoyerPourNomFichier(nomAsso) + '_' + (evtFiltre ? nettoyerPourNomFichier(evtFiltre) : 'Toutes_ventes') + '_' + new Date().toISOString().slice(0,10) + '.xlsx';
  XLSX.writeFile(classeur, nomFichier);
}

/* ────────────────────────────────────────────────────────────
   Impression directe du tableau des commandes (sans passer par Excel)
   ──────────────────────────────────────────────────────────── */
function imprimerCommandes(){
  const cs = commandesFiltrees();
  if(!cs.length){ afficherToast('Aucune commande à imprimer pour ces filtres.'); return; }

  const nomAsso = state.parametres.nomAssociation || 'Association';
  const evtFiltre = libelleFiltreEvenement();
  const inclureColEvt = !evtFiltre; // colonne événement redondante si un seul événement est déjà filtré
  const totalQte = cs.reduce((s,c)=>s+c.quantite,0);
  const totalCA = cs.reduce((s,c)=>s+c.montant,0);

  const colonnes = [
    { lib:'Nom', largeur: inclureColEvt?12:14, val:c=>echapper(c.nom) },
    { lib:'Prénom', largeur: inclureColEvt?12:14, val:c=>echapper(c.prenom) },
    { lib:'Téléphone', largeur: inclureColEvt?12:14, val:c=>echapper(c.telephone) }
  ];
  if(inclureColEvt) colonnes.push({ lib:'Événement', largeur:16, val:c=>echapper(c.evenementTitre) });
  colonnes.push({ lib:'Choix', largeur: inclureColEvt?11:14, val:c=>echapper(c.tarifLibelle) });
  colonnes.push({ lib:'Qté', largeur: inclureColEvt?6:7, val:c=>c.quantite, num:true });
  colonnes.push({ lib:'Montant', largeur: inclureColEvt?11:12, val:c=>formaterMontant(c.montant), num:true });
  colonnes.push({ lib:'Date commande', largeur: inclureColEvt?13:17, val:c=>formaterDateHeure(c.dateCommande) });
  colonnes.push({ lib:'Récupérée', largeur: inclureColEvt?7:8, val:c=>c.recuperee?'Oui':'Non' });

  const html = `
    <div class="imp-entete">
      <div>
        <h1>${echapper(nomAsso)}</h1>
        <div class="souTitre">Tableau des commandes${evtFiltre ? ' — ' + echapper(evtFiltre) : ''}</div>
      </div>
      <div class="meta">Édité le ${new Date().toLocaleDateString('fr-FR')} à ${new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}<br>${cs.length} commande${cs.length!==1?'s':''}</div>
    </div>
    <table class="imp-tableau">
      <colgroup>${colonnes.map(c=>`<col style="width:${c.largeur}%">`).join('')}</colgroup>
      <thead><tr>${colonnes.map(c=>`<th class="${c.num?'num':''}">${c.lib}</th>`).join('')}</tr></thead>
      <tbody>
        ${cs.map(c => `<tr>${colonnes.map(col=>`<td class="${col.num?'num':''}">${col.val(c)}</td>`).join('')}</tr>`).join('')}
      </tbody>
      <tfoot>
        <tr>${colonnes.map((col,i) => {
          if(col.lib==='Qté') return `<td class="num">${totalQte}</td>`;
          if(col.lib==='Montant') return `<td class="num">${formaterMontant(totalCA)}</td>`;
          if(i===0) return `<td>TOTAL</td>`;
          return `<td></td>`;
        }).join('')}</tr>
      </tfoot>
    </table>
    <div class="imp-pied">Le Carnet de l'Association — ${cs.length} commande${cs.length!==1?'s':''} · ${totalQte} unité${totalQte!==1?'s':''} · ${formaterMontant(totalCA)} de chiffre</div>
  `;
  document.getElementById('zoneImpression').innerHTML = html;
  setTimeout(() => window.print(), 60);
}

/* ════════════════════════════════════════════════════════════
   13. ESPACE ADMIN — PARAMÈTRES
   ════════════════════════════════════════════════════════════ */
function renderAdminParametres(){
  const p = state.parametres;
  return `
  <div class="bloc-section">
    <div class="titre-section"><h3>Informations de l'association</h3></div>
    <div class="carte carte-pad">
      <div class="champ"><label>Nom de l'association</label><input type="text" id="pNom" value="${echapper(p.nomAssociation)}"></div>
      <div class="champ"><label>Message d'accueil (page d'accueil publique)</label><textarea id="pMessage" rows="3">${echapper(p.messageAccueil)}</textarea></div>
      <div class="champ"><label>Message affiché après une commande</label><textarea id="pConfirm" rows="2">${echapper(p.messageConfirmation)}</textarea></div>
      <div class="champ"><label>Téléphone de contact (facultatif)</label><input type="text" id="pTel" value="${echapper(p.telephoneContact)}"></div>
      <button class="btn btn-vert" onclick="enregistrerParametres()">Enregistrer les informations</button>
    </div>
  </div>
  <div class="bloc-section">
    <div class="titre-section"><h3>Code d'accès à l'espace gestion</h3></div>
    <div class="carte carte-pad">
      <div class="champ"><label>Nouveau code d'accès</label><input type="text" id="pCode" value="${echapper(p.codeAdmin)}"></div>
      <button class="btn btn-vert" onclick="enregistrerCodeAdmin()">Mettre à jour le code</button>
    </div>
  </div>`;
}
async function enregistrerParametres(){
  const nv = {
    nomAssociation: document.getElementById('pNom').value.trim() || 'Mon Association',
    messageAccueil: document.getElementById('pMessage').value,
    messageConfirmation: document.getElementById('pConfirm').value,
    telephoneContact: document.getElementById('pTel').value
  };
  await enregistrerEtat(base => Object.assign({}, base, { parametres: Object.assign({}, base.parametres, nv) }));
  afficherToast('Informations enregistrées.');
}
async function enregistrerCodeAdmin(){
  const nv = document.getElementById('pCode').value.trim();
  if(!nv){ afficherToast('Le code ne peut pas être vide.'); return; }
  await enregistrerEtat(base => Object.assign({}, base, { parametres: Object.assign({}, base.parametres, {codeAdmin: nv}) }));
  afficherToast("Code d'accès mis à jour.");
}

/* ════════════════════════════════════════════════════════════
   14. RENDU GLOBAL & INITIALISATION
   ════════════════════════════════════════════════════════════ */
function renderApp(){
  const app = document.getElementById('app');
  let corps = '';
  if(vue.ecran === 'admin-login') corps = renderAdminLogin();
  else if(vue.ecran === 'admin') corps = renderAdmin();
  else corps = renderPublic();

  app.innerHTML = renderTopbar() + corps;
  definirEtatSync(window._dernierEtatSync || 'ok');
  if(vue.ecran==='admin' && vue.ongletAdmin==='commandes') rafraichirTableCommandes();
}

async function demarrer(){
  const local = chargerLocal();
  if(local) state = local;
  renderApp();
  await synchroniser(false);
  setInterval(() => synchroniser(false), CONFIG.INTERVALLE_SYNCHRO_MS);
}
document.addEventListener('DOMContentLoaded', demarrer);
</script>
</body>
</html>
